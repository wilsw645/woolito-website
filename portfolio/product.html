<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品集 — Woolito Animation</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>

    <header class="navbar" role="banner">
      <a href="/" class="navbar__logo" aria-label="Woolito Animation 首頁">
        <img src="/logo.png" alt="Woolito Animation" />
      </a>
            <nav class="navbar__nav" aria-label="主選單">
        <a href="/about.html" class="navbar__link">關於我們</a>
        <a href="/services.html" class="navbar__link">服務介紹</a>
        <a href="/portfolio.html" class="navbar__link">作品集</a>
        <a href="/blog.html" class="navbar__link">專欄&amp;消息</a>
        <a href="/contact.html" class="navbar__cta">開始合作</a>
      </nav>
    </header>

    <main data-theme="product" aria-label="主題作品集">

      <!-- Theme hero header -->
      <div class="theme-hero">
        <div class="theme-hero__accent"></div>
        <div class="theme-hero__text">
          <a href="/portfolio.html" class="theme-hero__back">← 回作品集</a>
          <h1 class="theme-hero__title">載入中…</h1>
          <p class="theme-hero__subtitle"></p>
        </div>
      </div>

      <!-- Works grid -->
      <div class="theme-works">
        <div class="theme-works__grid">
          <!-- Injected by JS -->
        </div>
      </div>

    </main>

    <section id="contact" class="contact" aria-label="聯絡我們">
      <div class="contact__inner">
        <div class="contact__text">
          <p class="contact__label">開始合作</p>
          <h2 class="contact__title">準備好讓你的<br />品牌動起來了嗎？</h2>
          <p class="contact__desc">
            告訴我們你的想法，<br />
            我們來把它變成讓人印象深刻的動畫。
          </p>
        </div>
        <div class="contact__links">
          <div class="contact__item">
            <div class="contact__icon">✉️</div>
            <div class="contact__item-text">
              <h4>Email</h4>
              <a href="mailto:contact@woolito.com">contact@woolito.com</a>
            </div>
          </div>
          <div class="contact__item">
            <div class="contact__icon">💬</div>
            <div class="contact__item-text">
              <h4>LINE 官方帳號</h4>
              <a href="https://line.me/R/ti/p/@woolito" target="_blank" rel="noopener">@woolito</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer__logo">
        <img src="/logo.png" alt="Woolito Animation" />
      </div>
      <p class="footer__copy">© 2024 Woolito Animation. All rights reserved.</p>
    </footer>

    <div id="video-modal" class="video-modal" role="dialog" aria-modal="true" aria-label="影片播放">
      <div class="video-modal__backdrop"></div>
      <div class="video-modal__content">
        <button class="video-modal__close" aria-label="關閉">✕</button>
        <div class="video-modal__video-wrap"></div>
      </div>
    </div>

    <script type="module" src="/src/portfolio-theme-main.ts"></script>
  </body>
</html>

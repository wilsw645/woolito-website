<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品集 — Woolito Animation</title>
    <meta name="description" content="Woolito Animation 完整作品集，涵蓋永續報告書動畫、品牌影片、產品說明、政令宣導等。" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>

    <header class="navbar" role="banner">
      <a href="/" class="navbar__logo" aria-label="Woolito Animation 首頁">
        <img src="/Logo.png" alt="Woolito Animation" />
      </a>
      <nav class="navbar__nav" aria-label="主選單">
        <a href="/#portfolio" class="navbar__link">作品集</a>
        <a href="/#contact" class="navbar__link">聯絡我們</a>
        <a href="/#contact" class="navbar__cta">開始合作</a>
      </nav>
    </header>

    <main style="padding-top: 100px;">
      <div class="container" style="padding-bottom: 80px;">
        <span class="section-label">完整作品集</span>
        <h1 style="font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 60px;">所有作品</h1>
      </div>
      <section id="portfolio" aria-label="作品集">
        <!-- Curation blocks injected by JS -->
      </section>
    </main>

    <section id="contact" class="contact" aria-label="聯絡我們">
      <div class="contact__inner">
        <div class="contact__text">
          <p class="contact__label">開始合作</p>
          <h2 class="contact__title">準備好讓你的<br />品牌動起來了嗎？</h2>
          <p class="contact__desc">
            告訴我們你的想法，<br />
            我們來把它變成讓人印象深刻的動畫。
          </p>
        </div>
        <div class="contact__links">
          <div class="contact__item">
            <div class="contact__icon">✉️</div>
            <div class="contact__item-text">
              <h4>Email</h4>
              <a href="mailto:contact@woolito.com">contact@woolito.com</a>
            </div>
          </div>
          <div class="contact__item">
            <div class="contact__icon">💬</div>
            <div class="contact__item-text">
              <h4>LINE 官方帳號</h4>
              <a href="https://line.me/R/ti/p/@woolito" target="_blank" rel="noopener">@woolito</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer__logo">
        <img src="/Logo.png" alt="Woolito Animation" />
      </div>
      <p class="footer__copy">© 2024 Woolito Animation. All rights reserved.</p>
      <div class="footer__social">
        <a href="#" target="_blank" rel="noopener">Instagram</a>
        <a href="#" target="_blank" rel="noopener">YouTube</a>
      </div>
    </footer>

    <div id="video-modal" class="video-modal" role="dialog" aria-modal="true" aria-label="影片播放">
      <div class="video-modal__backdrop"></div>
      <div class="video-modal__content">
        <button class="video-modal__close" aria-label="關閉">✕</button>
        <div class="video-modal__video-wrap"></div>
      </div>
    </div>

    <script type="module" src="/src/portfolio-main.ts"></script>
  </body>
</html>
